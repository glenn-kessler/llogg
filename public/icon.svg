<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#1a1a1a" rx="64"/>

  <!-- Heart symbol (♥) -->
  <text x="256" y="280" font-family="monospace, 'Courier New', Courier" font-size="180" font-weight="bold" fill="#e74c3c" text-anchor="middle" dominant-baseline="middle">♥</text>

  <!-- Superscript 3 (³) -->
  <text x="370" y="200" font-family="monospace, 'Courier New', Courier" font-size="100" font-weight="bold" fill="#3498db" text-anchor="middle" dominant-baseline="middle">³</text>

  <!-- Optional: Subtle grid pattern for data/logging feel -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#grid)" opacity="0.3" rx="64"/>
</svg>
