<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Life Logger - Test Page</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #ecf0f1;
            padding: 20px;
        }
        .log {
            background: #2d2d2d;
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #2ecc71;
        }
        .error {
            border-left-color: #e74c3c;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <h1>Life Logger - Test Suite</h1>
    <div id="tests"></div>

    <h2>Manual Tests</h2>
    <button onclick="testInit()">1. Test DB Init</button>
    <button onclick="testLoadTypes()">2. Load Types</button>
    <button onclick="testCreateEntry()">3. Create Entry</button>
    <button onclick="testExportCSV()">4. Test CSV Export</button>

    <script type="module">
        import { initDB, addDummyData, isInitialized } from './src/lib/db.js';
        import * as dataService from './src/lib/dataService.js';
        import { exportToCSV, downloadCSV } from './src/lib/csvService.js';

        const testsDiv = document.getElementById('tests');

        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            testsDiv.appendChild(div);
            console.log(message);
        }

        // Auto-run basic tests on load
        (async function runTests() {
            log('=== Starting Test Suite ===');

            try {
                // Test 1: Module Imports
                log('✓ Test 1: All modules imported successfully');

                // Test 2: Database Init
                log('Test 2: Initializing database...');
                const db = await initDB();
                log('✓ Database initialized: ' + db.name);

                // Test 3: Check if initialized
                const init = await isInitialized();
                if (!init) {
                    log('Test 3: Adding dummy data...');
                    await addDummyData(db);
                    log('✓ Dummy data added');
                } else {
                    log('✓ Test 3: Database already has data');
                }

                // Test 4: Load Types
                log('Test 4: Loading types...');
                const types = await dataService.getTypes();
                log(`✓ Loaded ${types.length} types: ${types.map(t => t.name).join(', ')}`);

                // Test 5: Load Details for first type
                if (types.length > 0) {
                    log(`Test 5: Loading details for type "${types[0].name}"...`);
                    const details = await dataService.getDetailsByType(types[0].id);
                    log(`✓ Loaded ${details.length} details: ${details.map(d => d.name).join(', ')}`);
                }

                log('=== All Auto-Tests Passed! ===');

            } catch (error) {
                log('✗ ERROR: ' + error.message, true);
                console.error(error);
            }
        })();

        // Manual test functions
        window.testInit = async function() {
            try {
                log('Manual Test: DB Init...');
                const db = await initDB();
                log('✓ DB Name: ' + db.name + ', Version: ' + db.version);
            } catch (error) {
                log('✗ ' + error.message, true);
            }
        };

        window.testLoadTypes = async function() {
            try {
                log('Manual Test: Loading types...');
                const types = await dataService.getTypes();
                types.forEach(type => {
                    log(`  - ${type.name} (${type.charIcon}) [${type.color}]`);
                });
                log(`✓ Total: ${types.length} types`);
            } catch (error) {
                log('✗ ' + error.message, true);
            }
        };

        window.testCreateEntry = async function() {
            try {
                log('Manual Test: Creating test entry...');

                // Get first type and detail
                const types = await dataService.getTypes();
                if (types.length === 0) {
                    throw new Error('No types available');
                }

                const details = await dataService.getDetailsByType(types[0].id);
                if (details.length === 0) {
                    throw new Error('No details available for type: ' + types[0].name);
                }

                // Create entry
                const entryId = await dataService.createEntry({
                    typeId: types[0].id,
                    detailId: details[0].id,
                    count: 5
                });

                log(`✓ Entry created with ID: ${entryId}`);
                log(`  Type: ${types[0].name}, Detail: ${details[0].name}, Count: 5`);

                // Verify by loading entries
                const entries = await dataService.getEntries();
                log(`✓ Total entries in DB: ${entries.length}`);

            } catch (error) {
                log('✗ ' + error.message, true);
                console.error(error);
            }
        };

        window.testExportCSV = async function() {
            try {
                log('Manual Test: Exporting CSV...');
                const csv = await exportToCSV();
                const lines = csv.split('\n').filter(l => l.trim());
                log(`✓ CSV generated with ${lines.length} lines (including header)`);
                log('First 3 lines:');
                lines.slice(0, 3).forEach(line => log('  ' + line));
            } catch (error) {
                log('✗ ' + error.message, true);
            }
        };
    </script>
</body>
</html>
